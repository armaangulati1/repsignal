name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (tsc --noEmit across the monorepo)
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test (Vitest, offline, no API key)
        run: npm test

      - name: Build web dashboard
        run: npm --workspace @repsignal/web run build
