name: Deploy web to GitHub Pages

# Builds the React dashboard in static demo mode and publishes it to GitHub
# Pages at https://armaangulati1.github.io/repsignal/. The demo build makes NO
# network calls: no Anthropic API, no backend. It renders a self-authored
# synthetic sample from the eval set. There is no API key in this workflow.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least privilege plus the tokens the Pages deploy needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; do not cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web dashboard (static demo mode)
        run: npm --workspace @repsignal/web run build
        env:
          VITE_DEMO_MODE: 'true'

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
